name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || true

      - name: Run tests
        run: make test

      - name: Build app
        run: make build
