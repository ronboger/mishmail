name: PerfectMail
options:
  bundleIdPrefix: dev.ronboger
  deploymentTarget:
    macOS: "14.0"
packages:
  GRDB:
    url: https://github.com/duckduckgo/GRDB.swift
    exactVersion: 3.0.0
targets:
  PerfectMail:
    type: application
    platform: macOS
    sources: [Sources/PerfectMail]
    dependencies:
      - package: GRDB
    entitlements:
      path: Sources/PerfectMail/PerfectMail.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.files.user-selected.read-write: true
        # The tracked signing default is ad-hoc + hardened runtime. Hardened
        # runtime turns on library validation, which requires every loaded
        # library to share the app's Team ID — but the SPM-built GRDB.framework
        # gets its own separate ad-hoc signature, so dyld rejects it at launch
        # ("different Team IDs") and the app crashes. Disabling library
        # validation lets the ad-hoc app load its embedded framework. It's a
        # no-op once you sign with a real Developer ID (Xcode re-signs the
        # framework with your team, so validation passes anyway).
        com.apple.security.cs.disable-library-validation: true
    # Signing lives in Config/Signing.xcconfig (portable ad-hoc default; drop a
    # Config/Local.xcconfig to sign with your own team). Keep it out of the
    # per-target settings so the xcconfig actually wins.
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        ENABLE_HARDENED_RUNTIME: true
      # Debug and Release build two DISTINCT apps so a throwaway test build is
      # never confused with — or able to corrupt — the real one you use daily:
      #   Release  → "PerfectMail",       dev.ronboger.PerfectMail        (make install → /Applications)
      #   Debug    → "PerfectMail Debug", dev.ronboger.PerfectMail.debug  (make run, launched in place)
      # The different bundle id gives Debug its own sandbox container + keychain,
      # so it syncs into a separate local database (sign in once; tokens persist
      # across rebuilds) and can't touch the real app's data. They coexist.
      configs:
        Debug:
          PRODUCT_NAME: PerfectMail Debug
          PRODUCT_BUNDLE_IDENTIFIER: dev.ronboger.PerfectMail.debug
          INFOPLIST_KEY_CFBundleDisplayName: PerfectMail Debug
        Release:
          PRODUCT_NAME: PerfectMail
          PRODUCT_BUNDLE_IDENTIFIER: dev.ronboger.PerfectMail
  # Standalone unit tests over the non-UI core (parsers, MIME, DB schema,
  # sync derivation). Compiles those sources directly — no app host, so no
  # keychain prompts, no network, no real database.
  PerfectMailTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/PerfectMailTests
      - Sources/PerfectMail/Gmail
      - Sources/PerfectMail/Store/Database.swift
      - Sources/PerfectMail/Support/HTMLEntities.swift
      - Sources/PerfectMail/Support/KeyBindings.swift
      - Sources/PerfectMail/Support/Keychain.swift
      - Sources/PerfectMail/Support/SearchQuery.swift
      - Sources/PerfectMail/Support/SelectionAdvance.swift
      - Sources/PerfectMail/Support/SendSchedule.swift
      - Sources/PerfectMail/Support/Classifier.swift
      - Sources/PerfectMail/Support/SnippetExpander.swift
      - Sources/PerfectMail/Support/UpdateChecker.swift
      - Sources/PerfectMail/Auth/OAuth.swift
    dependencies:
      - package: GRDB
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: true
schemes:
  PerfectMail:
    build:
      targets:
        PerfectMail: all
    run:
      config: Debug
    archive:
      config: Release
  PerfectMailTests:
    build:
      targets:
        PerfectMailTests: [test]
    test:
      config: Debug
      targets:
        - PerfectMailTests
