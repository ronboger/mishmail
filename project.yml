name: PerfectMail
options:
  bundleIdPrefix: dev.ronboger
  deploymentTarget:
    macOS: "14.0"
packages:
  GRDB:
    url: https://github.com/duckduckgo/GRDB.swift
    exactVersion: 3.0.0
targets:
  PerfectMail:
    type: application
    platform: macOS
    sources: [Sources/PerfectMail]
    dependencies:
      - package: GRDB
    entitlements:
      path: Sources/PerfectMail/PerfectMail.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.files.user-selected.read-write: true
    # Signing lives in Config/Signing.xcconfig (portable ad-hoc default; drop a
    # Config/Local.xcconfig to sign with your own team). Keep it out of the
    # per-target settings so the xcconfig actually wins.
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        ENABLE_HARDENED_RUNTIME: true
  # Standalone unit tests over the non-UI core (parsers, MIME, DB schema,
  # sync derivation). Compiles those sources directly — no app host, so no
  # keychain prompts, no network, no real database.
  PerfectMailTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/PerfectMailTests
      - Sources/PerfectMail/Gmail
      - Sources/PerfectMail/Store/Database.swift
      - Sources/PerfectMail/Support/Keychain.swift
      - Sources/PerfectMail/Support/SearchQuery.swift
      - Sources/PerfectMail/Support/SendSchedule.swift
      - Sources/PerfectMail/Support/Classifier.swift
      - Sources/PerfectMail/Support/SnippetExpander.swift
      - Sources/PerfectMail/Auth/OAuth.swift
    dependencies:
      - package: GRDB
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: true
schemes:
  PerfectMail:
    build:
      targets:
        PerfectMail: all
    run:
      config: Debug
    archive:
      config: Release
  PerfectMailTests:
    build:
      targets:
        PerfectMailTests: [test]
    test:
      config: Debug
      targets:
        - PerfectMailTests
