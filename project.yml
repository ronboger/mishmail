name: MishMail
options:
  bundleIdPrefix: dev.ronboger
  deploymentTarget:
    macOS: "14.0"
packages:
  GRDB:
    url: https://github.com/duckduckgo/GRDB.swift
    exactVersion: 3.0.0
targets:
  MishMail:
    type: application
    platform: macOS
    sources: [Sources/MishMail]
    dependencies:
      - package: GRDB
    entitlements:
      path: Sources/MishMail/MishMail.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.files.user-selected.read-write: true
        # The tracked signing default is ad-hoc + hardened runtime. Hardened
        # runtime turns on library validation, which requires every loaded
        # library to share the app's Team ID — but the SPM-built GRDB.framework
        # gets its own separate ad-hoc signature, so dyld rejects it at launch
        # ("different Team IDs") and the app crashes. Disabling library
        # validation lets the ad-hoc app load its embedded framework.
        #
        # For Developer ID / notarized shipping builds, use
        # MishMail.Distribution.entitlements instead (no disable) — Xcode
        # re-signs GRDB with your team so validation passes, and the process
        # stays fully hardened. See Config/Signing.xcconfig.
        com.apple.security.cs.disable-library-validation: true
    # Signing lives in Config/Signing.xcconfig (portable ad-hoc default; drop a
    # Config/Local.xcconfig to sign with your own team). Keep it out of the
    # per-target settings so the xcconfig actually wins.
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        MARKETING_VERSION: 0.3.1
        CURRENT_PROJECT_VERSION: 2
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        ENABLE_HARDENED_RUNTIME: true
        # GRDB ships sqlite3.h next to its umbrella without listing it there;
        # clang emits -Wincomplete-umbrella for that. Harmless third-party noise.
        OTHER_CFLAGS: "$(inherited) -Wno-incomplete-umbrella"
      # Debug and Release build two DISTINCT apps so a throwaway test build is
      # never confused with — or able to corrupt — the real one you use daily:
      #   Release  → "MishMail",       dev.ronboger.MishMail        (make install → /Applications)
      #   Debug    → "MishMail Debug", dev.ronboger.MishMail.debug  (make run, launched in place)
      # The different bundle id gives Debug its own sandbox container + keychain,
      # so it syncs into a separate local database (sign in once; tokens persist
      # across rebuilds) and can't touch the real app's data. They coexist.
      configs:
        Debug:
          PRODUCT_NAME: MishMail Debug
          PRODUCT_BUNDLE_IDENTIFIER: dev.ronboger.MishMail.debug
          INFOPLIST_KEY_CFBundleDisplayName: MishMail Debug
        Release:
          PRODUCT_NAME: MishMail
          PRODUCT_BUNDLE_IDENTIFIER: dev.ronboger.MishMail
  # Standalone unit tests over the non-UI core (parsers, MIME, DB schema,
  # sync derivation). Compiles those sources directly — no app host, so no
  # keychain prompts, no network, no real database.
  MishMailTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/MishMailTests
      - Sources/MishMail/Gmail
      - Sources/MishMail/Store/Database.swift
      - Sources/MishMail/Store/SidebarCounts.swift
      - Sources/MishMail/Store/ThreadLabels.swift
      - Sources/MishMail/Support/ContactMiner.swift
      - Sources/MishMail/Support/ComposeLinks.swift
      - Sources/MishMail/Support/HTMLEntities.swift
      - Sources/MishMail/Support/KeyBindings.swift
      - Sources/MishMail/Support/LabelSearch.swift
      - Sources/MishMail/Support/Keychain.swift
      - Sources/MishMail/Support/SearchQuery.swift
      - Sources/MishMail/Support/SelectionAdvance.swift
      - Sources/MishMail/Support/GoToMailbox.swift
      - Sources/MishMail/Support/AccountOrder.swift
      - Sources/MishMail/Support/GmailFilterMatch.swift
      - Sources/MishMail/Support/GmailWebLinks.swift
      - Sources/MishMail/Support/SnoozeDateParser.swift
      - Sources/MishMail/Support/PrioritySplit.swift
      - Sources/MishMail/Support/SendSchedule.swift
      - Sources/MishMail/Support/SendIdentity.swift
      - Sources/MishMail/Support/Classifier.swift
      - Sources/MishMail/Support/SnippetDefaults.swift
      - Sources/MishMail/Support/SnippetExpander.swift
      - Sources/MishMail/Support/SnippetImport.swift
      - Sources/MishMail/Support/SnippetInsertion.swift
      - Sources/MishMail/Support/SnippetMatch.swift
      - Sources/MishMail/Support/UpdateChecker.swift
      - Sources/MishMail/Support/HTMLBodyCSP.swift
      - Sources/MishMail/Support/HTMLBodyDarkMode.swift
      - Sources/MishMail/Support/RemoteImagePolicy.swift
      - Sources/MishMail/Support/ThreadExporter.swift
      - Sources/MishMail/Support/Markdown.swift
      - Sources/MishMail/Support/MailLayout.swift
      - Sources/MishMail/Support/ComposePlacement.swift
      - Sources/MishMail/Support/DemoSeed.swift
      - Sources/MishMail/Support/ErrorRecovery.swift
      - Sources/MishMail/Support/Ollama.swift
      - Sources/MishMail/Support/PerfMetrics.swift
      - Sources/MishMail/Support/ThreadTypeahead.swift
      - Sources/MishMail/Support/OpenFromSearch.swift
      - Sources/MishMail/Support/HistoryFetchFormat.swift
      - Sources/MishMail/Support/ThreadListCursor.swift
      - Sources/MishMail/Support/NeighborPrefetch.swift
      - Sources/MishMail/Support/ThreadRefresh.swift
      - Sources/MishMail/Auth/OAuth.swift
    dependencies:
      - package: GRDB
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: true
        # Same GRDB incomplete-umbrella noise as the app target.
        OTHER_CFLAGS: "$(inherited) -Wno-incomplete-umbrella"
  MishMailUITests:
    type: bundle.ui-testing
    platform: macOS
    sources: [Tests/MishMailUITests]
    dependencies:
      - target: MishMail
    settings:
      base:
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: true
schemes:
  MishMail:
    build:
      targets:
        MishMail: all
    run:
      config: Debug
    archive:
      config: Release
  MishMailTests:
    build:
      targets:
        MishMailTests: [test]
    test:
      config: Debug
      targets:
        - MishMailTests
  MishMailUITests:
    build:
      targets:
        MishMail: all
        MishMailUITests: [test]
    test:
      config: Debug
      targets:
        - MishMailUITests
