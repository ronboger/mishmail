name: PerfectMail
options:
  bundleIdPrefix: dev.ronboger
  deploymentTarget:
    macOS: "14.0"
packages:
  GRDB:
    url: https://github.com/duckduckgo/GRDB.swift
    exactVersion: 3.0.0
targets:
  PerfectMail:
    type: application
    platform: macOS
    sources: [Sources/PerfectMail]
    dependencies:
      - package: GRDB
    entitlements:
      path: Sources/PerfectMail/PerfectMail.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.files.user-selected.read-only: true
    settings:
      base:
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 47T79PSL25
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        ENABLE_HARDENED_RUNTIME: false
