<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- macOS squircle background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4C8DFF"/>
      <stop offset="0.55" stop-color="#2F6BF2"/>
      <stop offset="1" stop-color="#1E49C7"/>
    </linearGradient>
    <!-- top sheen -->
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.35" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- envelope body gradient -->
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#EAF1FF"/>
    </linearGradient>
    <!-- flap gradient -->
    <linearGradient id="flap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4F8FF"/>
      <stop offset="1" stop-color="#D4E2FB"/>
    </linearGradient>
    <linearGradient id="check" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#39D98A"/>
      <stop offset="1" stop-color="#22B36B"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#0A2A7A" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Rounded-rect (squircle-ish) app tile: 824x824 inset 100, r=185 -->
  <g>
    <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#bg)"/>
    <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="url(#sheen)"/>
  </g>

  <!-- Envelope, centered -->
  <g filter="url(#softShadow)">
    <!-- envelope body -->
    <rect x="248" y="330" width="528" height="372" rx="52" ry="52" fill="url(#paper)"/>
    <!-- flap: V shape overlaid on top portion -->
    <path d="M 268 372
             L 512 560
             L 756 372
             L 756 392
             C 756 356 728 352 712 364
             L 512 518
             L 312 364
             C 296 352 268 356 268 392
             Z"
          fill="url(#flap)"/>
    <!-- clean flap crease line -->
    <path d="M 276 366 L 512 548 L 748 366"
          fill="none" stroke="#B9CCEB" stroke-width="14"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  </g>

  <!-- "Perfect" checkmark badge, bottom-right of envelope -->
  <g filter="url(#softShadow)">
    <circle cx="726" cy="672" r="104" fill="url(#check)"/>
    <circle cx="726" cy="672" r="104" fill="none" stroke="#ffffff" stroke-width="10" opacity="0.9"/>
    <path d="M 676 674 L 712 710 L 780 634"
          fill="none" stroke="#ffffff" stroke-width="26"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
